
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; }

  .app-shell { display: flex; gap: 24px; padding: 16px 0; }

  .form-panel {
    width: 300px;
    flex-shrink: 0;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 16px;
    height: fit-content;
  }

  .form-panel h2 {
    font-size: 14px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }

  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .field input, .field select {
    width: 100%; padding: 6px 8px; font-size: 13px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
  }

  .inv-no-row { display: flex; align-items: center; gap: 6px; }
  .inv-prefix {
    font-size: 13px; font-weight: 500; color: var(--color-text-secondary);
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 6px 8px;
    white-space: nowrap;
  }
  .inv-no-row input { flex: 1; }

  .items-header { display: flex; justify-content: space-between; align-items: center; margin: 12px 0 8px; }
  .items-header span { font-size: 12px; color: var(--color-text-secondary); }
  .add-btn {
    font-size: 12px; padding: 4px 10px; cursor: pointer;
    background: var(--color-background-info);
    color: var(--color-text-info);
    border: 0.5px solid var(--color-border-info);
    border-radius: var(--border-radius-md);
  }

  .line-item { display: grid; grid-template-columns: 1fr 52px 64px 22px; gap: 4px; margin-bottom: 6px; align-items: center; }
  .line-item input { padding: 5px 6px; font-size: 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
  .remove-btn { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); font-size: 16px; line-height: 1; padding: 2px; }
  .remove-btn:hover { color: var(--color-text-danger); }

  .print-btn {
    width: 100%; margin-top: 14px; padding: 9px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    background: #00BFFF; color: #fff;
    border: none; border-radius: var(--border-radius-md);
  }
  .print-btn:hover { background: #009fd4; }

  .preview-panel { flex: 1; min-width: 0; }
  .preview-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* ===== INVOICE STYLES ===== */
  #invoice {
    background: #fff;
    width: 100%;
    font-family: Arial, sans-serif;
    color: #111;
    border: 1px solid #ddd;
    font-size: 14px;
    max-width: 800px;
    margin: 0 auto;
  }

  .inv-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 30px 30px 0;
    position: relative;
  }

  .inv-watermark {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background-image: url('logo.jpeg');
    background-size: 70%;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }

  .inv-logo-area { display: flex; flex-direction: column; align-items: flex-start; }
  .inv-logo { display: flex; align-items: center; gap: 12px; }
  .inv-logo img { height: 90px; width: auto; }
  .inv-logo-text { line-height: 1; }
  .inv-logo-text .brand { font-size: 36px; font-weight: 900; color: #00BFFF; letter-spacing: 1px; }
  .inv-logo-text .tagline { font-size: 14px; font-style: italic; color: #555; margin-top: 4px; }

  .inv-corner { position: absolute; top: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 80px 80px 0; border-color: transparent #00BFFF transparent transparent; }

  .inv-title-block { text-align: center; padding: 20px 30px; }
  .inv-title-block h1 { font-size: 18px; font-weight: 700; letter-spacing: 2px; color: #111; }
  .inv-no-display { color: #00BFFF; font-weight: 700; font-size: 16px; margin-left: 12px; }

  .inv-meta-table { width: calc(100% - 60px); margin: 0 30px 16px; border-collapse: collapse; font-size: 14px; }
  .inv-meta-table td { border: 1px solid #ccc; padding: 8px 12px; }
  .inv-meta-table td:first-child { font-weight: 700; width: 100px; background: #f8f8f8; }
  .inv-meta-table td:nth-child(3) { font-weight: 700; width: 100px; background: #f8f8f8; }

  .inv-items-table { width: calc(100% - 60px); margin: 0 30px 16px; border-collapse: collapse; font-size: 14px; }
  .inv-items-table th { background: #00BFFF; color: #fff; padding: 10px 14px; text-align: left; font-weight: 700; }
  .inv-items-table th:last-child, .inv-items-table td:last-child { text-align: right; }
  .inv-items-table td { border: 1px solid #ddd; padding: 10px 14px; }
  .inv-items-table tr:nth-child(even) td { background: #f9f9f9; }
  .inv-total-row td { border: none; padding: 10px 14px; text-align: right; font-weight: 700; font-size: 15px; }
  .inv-total-row td:last-child { font-size: 16px; color: #111; }

  .inv-footer { display: flex; justify-content: space-between; align-items: flex-end; padding: 12px 30px 20px; border-top: 1px solid #eee; }
  .inv-payment h4 { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .inv-payment p { font-size: 13px; line-height: 1.7; color: #333; }
  .inv-stamp {
    width: 90px; height: 90px; border-radius: 50%;
    border: 2px solid #00BFFF;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #00BFFF; font-size: 9px; font-weight: 700; text-align: center; letter-spacing: 0.5px;
    opacity: 0.8;
  }
  .inv-contact { text-align: center; font-size: 12px; color: #555; padding: 10px 30px 20px; border-top: 1px solid #eee; }

  @media print {
    .app-shell { display: block; }
    .form-panel { display: none; }
    .preview-label { display: none; }
    #invoice { border: none; }
    body { background: white; }
  }
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden">Rayaan Air invoice generator — fill in the form on the left to generate a printable invoice</h2>

<div class="app-shell">

  <!-- FORM -->
  <div class="form-panel">
    <h2><i class="ti ti-file-invoice" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:5px"></i>Invoice details</h2>

    <div class="field">
      <label>Invoice number</label>
      <div class="inv-no-row">
        <span class="inv-prefix">RA -</span>
        <input type="text" id="f-invno" placeholder="61" oninput="render()">
      </div>
    </div>

    <div class="field">
      <label>Bill to</label>
      <input type="text" id="f-billto" placeholder="KEYSOOM" oninput="render()">
    </div>

    <div class="field">
      <label>Route</label>
      <input type="text" id="f-route" placeholder="MGQ – DSM – ABW – MGQ" oninput="render()">
    </div>

    <div class="field">
      <label>Flight date</label>
      <input type="date" id="f-flightdate" oninput="render()">
    </div>

    <div class="field">
      <label>Date issued</label>
      <input type="date" id="f-issuedate" oninput="render()">
    </div>

    <div class="items-header">
      <span>Line items</span>
      <button class="add-btn" onclick="addItem()"><i class="ti ti-plus" aria-hidden="true"></i> Add row</button>
    </div>

    <div id="items-list"></div>

    <button class="print-btn" onclick="window.print()"><i class="ti ti-printer" aria-hidden="true" style="margin-right:5px"></i>Print / Save PDF</button>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <p class="preview-label">Live preview</p>
    <div id="invoice"></div>
  </div>
</div>

<script>
let items = [
  { desc: 'HOURS', qty: '3.07', rate: '1400' },
  { desc: 'FAVORI', qty: '1', rate: '1130' },
  { desc: 'CREW PERDIM', qty: '1', rate: '300' }
];

function today() {
  return new Date().toISOString().split('T')[0];
}

function fmtDate(val) {
  if (!val) return '';
  const [y, m, d] = val.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d + '-' + months[parseInt(m)-1] + '-' + y;
}

function addItem() {
  items.push({ desc: '', qty: '', rate: '' });
  renderForm();
  render();
}

function removeItem(i) {
  items.splice(i, 1);
  renderForm();
  render();
}

function renderForm() {
  const list = document.getElementById('items-list');
  list.innerHTML = items.map((it, i) => `
    <div class="line-item">
      <input type="text" placeholder="Description" value="${it.desc}" oninput="items[${i}].desc=this.value;render()">
      <input type="text" placeholder="Qty" value="${it.qty}" oninput="items[${i}].qty=this.value;render()">
      <input type="text" placeholder="Rate $" value="${it.rate}" oninput="items[${i}].rate=this.value;render()">
      <button class="remove-btn" onclick="removeItem(${i})" aria-label="Remove row">&times;</button>
    </div>
  `).join('');
}

function render() {
  const invNo = document.getElementById('f-invno').value.trim();
  const billTo = document.getElementById('f-billto').value.trim() || 'KEYSOOM';
  const route = document.getElementById('f-route').value.trim() || 'MGQ – DSM – ABW – MGQ';
  const flightDate = fmtDate(document.getElementById('f-flightdate').value) || '2-MAY-2026';
  const issueDate = fmtDate(document.getElementById('f-issuedate').value) || '5-may-2026';

  let total = 0;
  const rows = items.map((it, i) => {
    const qty = parseFloat(it.qty) || 0;
    const rate = parseFloat(it.rate) || 0;
    const amt = qty * rate;
    total += amt;
    const amtStr = amt ? '$' + amt.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0}) : '';
    return `<tr>
      <td style="text-align:center">${i+1}</td>
      <td><strong>${it.desc || ''}</strong></td>
      <td style="text-align:center">${it.qty || ''}</td>
      <td style="text-align:right">${it.rate ? '$' + parseFloat(it.rate).toLocaleString() : ''}</td>
      <td style="text-align:right;font-weight:700">${amtStr}</td>
    </tr>`;
  }).join('');

  const totalStr = '$' + total.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});

  document.getElementById('invoice').innerHTML = `
    <div style="position:relative;overflow:hidden">
      <div class="inv-corner"></div>
      <div class="inv-watermark"></div>

      <div class="inv-top">
        <div class="inv-logo-area">
          <div class="inv-logo">
            <div class="inv-logo-text">
              <div class="brand">RAYAAN AIR</div>
              <div class="tagline">The Skies Of Somalia</div>
            </div>
          </div>
        </div>
      </div>

      <div class="inv-title-block">
        <span style="font-size:22px;font-weight:700;letter-spacing:2px">INVOICE</span>
        <span class="inv-no-display">RA - ${invNo || '___'}</span>
      </div>

      <table class="inv-meta-table">
        <tr>
          <td>From</td><td>Rayaan Air</td>
          <td>Date Issue</td><td>${issueDate}</td>
        </tr>
        <tr>
          <td>Bill To</td><td><strong>${billTo}</strong></td>
          <td>Route</td><td><strong>${route}</strong></td>
        </tr>
        <tr>
          <td>Flight Date</td><td><strong>${flightDate}</strong></td>
          <td></td><td></td>
        </tr>
      </table>

      <table class="inv-items-table">
        <thead>
          <tr>
            <th style="width:40px">No</th>
            <th>Description</th>
            <th style="width:80px;text-align:center">Quantity</th>
            <th style="width:120px;text-align:right">Rate (USD)</th>
            <th style="width:120px">Amount (USD)</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr class="inv-total-row">
            <td colspan="4" style="text-align:right;font-weight:700">Total Balance</td>
            <td style="text-align:right;font-weight:700;font-size:16px">${totalStr}</td>
          </tr>
        </tfoot>
      </table>

      <div class="inv-footer">
        <div class="inv-payment">
          <h4>Payment Method</h4>
          <p><strong>Bank: SALAAM BANK</strong><br>
          Account Name: Rayaan Air &amp; Cargo Sales<br>
          Account Number: <strong>38496121</strong><br><br>
          <strong>IBS BANK</strong><br>
          Account Name: Rayaan Air &amp; Cargo<br>
          Account Number: <strong>0209384308840014</strong></p>
        </div>
        <div class="inv-stamp">
          <div style="font-size:13px;font-weight:900;color:#00BFFF;letter-spacing:1px">RAYAAN AIR</div>
          <div style="font-size:10px;color:#00BFFF;margin-top:2px">MOGADISHU – SOMALIA</div>
        </div>
      </div>

      <div class="inv-contact">
        Banadir, Mogdishu, Somalia &nbsp;|&nbsp; +252613363634 &nbsp;|&nbsp; rayaanair@gmail.com
      </div>
    </div>
  `;
}

document.getElementById('f-issuedate').value = today();
document.getElementById('f-flightdate').value = today();
renderForm();
render();
</script>

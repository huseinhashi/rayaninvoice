<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rayaan Air — Invoice Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    color: #111;
    min-height: 100vh;
    padding: 24px;
  }

  /* ── LAYOUT ── */
  .app-shell {
    display: flex;
    gap: 28px;
    max-width: 1180px;
    margin: 0 auto;
    align-items: flex-start;
  }

  /* ── FORM PANEL ── */
  .form-panel {
    width: 300px;
    flex-shrink: 0;
    background: #fff;
    border: 1px solid #dde1e7;
    border-radius: 12px;
    padding: 20px;
    position: sticky;
    top: 24px;
  }

  .form-panel h2 {
    font-size: 14px;
    font-weight: 700;
    color: #111;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 5px;
  }
  .field input {
    width: 100%;
    padding: 8px 10px;
    font-size: 13px;
    border: 1px solid #dde1e7;
    border-radius: 7px;
    background: #fff;
    color: #111;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: #00BFFF; }

  .inv-no-row { display: flex; align-items: center; gap: 6px; }
  .inv-prefix {
    font-size: 13px; font-weight: 700; color: #00BFFF;
    background: #e8f8ff;
    border: 1px solid #b3e9ff;
    border-radius: 7px;
    padding: 8px 10px;
    white-space: nowrap;
  }
  .inv-no-row input { flex: 1; }

  .items-section { margin-top: 16px; }
  .items-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 10px;
  }
  .items-header span {
    font-size: 11px; font-weight: 700; color: #666;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .add-btn {
    font-size: 12px; padding: 5px 11px; cursor: pointer;
    background: #e8f8ff; color: #0099cc;
    border: 1px solid #b3e9ff;
    border-radius: 7px; font-weight: 600;
    transition: background 0.15s;
  }
  .add-btn:hover { background: #ccf0ff; }

  .col-labels {
    display: grid;
    grid-template-columns: 1fr 54px 70px 22px;
    gap: 4px; margin-bottom: 4px;
  }
  .col-labels span {
    font-size: 10px; font-weight: 700; color: #999;
    text-transform: uppercase; letter-spacing: 0.04em;
    padding: 0 2px;
  }

  .line-item {
    display: grid;
    grid-template-columns: 1fr 54px 70px 22px;
    gap: 4px; margin-bottom: 6px; align-items: center;
  }
  .line-item input {
    padding: 7px 6px; font-size: 12px;
    border: 1px solid #dde1e7; border-radius: 6px;
    background: #fff; color: #111; outline: none;
    transition: border-color 0.15s;
  }
  .line-item input:focus { border-color: #00BFFF; }
  .remove-btn {
    background: none; border: none; cursor: pointer;
    color: #bbb; font-size: 18px; line-height: 1;
    padding: 2px; border-radius: 4px;
    transition: color 0.15s;
  }
  .remove-btn:hover { color: #e05; }

  .print-btn {
    width: 100%; margin-top: 18px; padding: 11px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    background: #00BFFF; color: #fff;
    border: none; border-radius: 8px;
    letter-spacing: 0.03em;
    transition: background 0.15s;
  }
  .print-btn:hover { background: #009fd4; }

  /* ── PREVIEW ── */
  .preview-panel { flex: 1; min-width: 0; }
  .preview-label {
    font-size: 11px; font-weight: 700; color: #888;
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 10px;
  }

  /* ── INVOICE (A4 proportions) ── */
  #invoice {
    background: #fff;
    width: 100%;
    /* A4 ratio: 210 x 297mm — we render at display width, print uses @page */
    min-height: 800px;
    font-family: Arial, sans-serif;
    color: #111;
    border: 1px solid #dde1e7;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }

  /* corner triangle */
  .inv-corner {
    position: absolute; top: 0; right: 0;
    width: 0; height: 0; border-style: solid;
    border-width: 0 90px 90px 0;
    border-color: transparent #00BFFF transparent transparent;
    z-index: 2;
  }

  /* watermark strip */
  .inv-watermark {
    position: absolute; top: 0; right: 0;
    width: 180px; bottom: 0;
    display: flex; flex-direction: column;
    overflow: hidden; pointer-events: none; z-index: 1;
  }
  .inv-watermark span {
    font-size: 11px; font-weight: 700;
    color: #b0d8e8; white-space: nowrap;
    letter-spacing: 1px; line-height: 1.65;
    font-family: Arial, sans-serif;
  }

  /* logo */
  .inv-logo-wrap {
    padding: 22px 24px 0;
    position: relative; z-index: 3;
  }
  .inv-logo-wrap img {
    height: 64px;
    width: auto;
    display: block;
  }

  /* INVOICE title row */
  .inv-title-row {
    display: flex; align-items: baseline;
    justify-content: center;
    padding: 14px 24px 10px;
    position: relative; z-index: 3;
  }
  .inv-title-row .word {
    font-size: 26px; font-weight: 900;
    letter-spacing: 3px; color: #111;
  }
  .inv-title-row .inv-ref {
    font-size: 18px; font-weight: 700;
    color: #00BFFF; margin-left: 14px;
  }

  /* meta table */
  .inv-meta {
    width: calc(100% - 48px);
    margin: 0 24px 16px;
    border-collapse: collapse;
    font-size: 14px;
    position: relative; z-index: 3;
  }
  .inv-meta td {
    border: 1px solid #ccc;
    padding: 8px 12px;
    vertical-align: middle;
  }
  .inv-meta td.lbl {
    font-weight: 700; background: #f5f5f5;
    width: 110px; color: #333;
  }
  .inv-meta td.val { color: #111; }
  .inv-meta td.val strong { font-weight: 700; }

  /* items table */
  .inv-items {
    width: calc(100% - 48px);
    margin: 0 24px 0;
    border-collapse: collapse;
    font-size: 14px;
    position: relative; z-index: 3;
  }
  .inv-items thead th {
    background: #00BFFF; color: #fff;
    padding: 10px 14px;
    font-weight: 700; font-size: 14px;
    text-align: left;
  }
  .inv-items thead th:nth-child(3),
  .inv-items thead th:nth-child(4),
  .inv-items thead th:nth-child(5) { text-align: right; }
  .inv-items thead th:nth-child(1) { text-align: center; width: 46px; }

  .inv-items tbody td {
    border: 1px solid #ddd;
    padding: 9px 14px;
    font-size: 14px;
  }
  .inv-items tbody td:nth-child(1) { text-align: center; color: #555; }
  .inv-items tbody td:nth-child(2) { font-weight: 700; }
  .inv-items tbody td:nth-child(3),
  .inv-items tbody td:nth-child(4),
  .inv-items tbody td:nth-child(5) { text-align: right; }
  .inv-items tbody tr:nth-child(even) td { background: #f9f9f9; }

  .inv-total-row td {
    border: none;
    padding: 10px 14px;
    text-align: right;
    font-weight: 700;
    font-size: 16px;
    border-top: 2px solid #00BFFF;
  }

  /* footer */
  .inv-footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 18px 24px 20px;
    margin-top: 14px;
    border-top: 1px solid #eee;
    position: relative; z-index: 3;
  }
  .inv-payment h4 {
    font-size: 13px; font-weight: 700;
    margin-bottom: 6px; color: #111;
  }
  .inv-payment p {
    font-size: 12px; line-height: 1.75; color: #333;
  }
  .inv-stamp {
    width: 82px; height: 82px; border-radius: 50%;
    border: 2.5px solid #00BFFF;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #00BFFF; text-align: center; opacity: 0.7;
    flex-shrink: 0;
  }
  .inv-stamp .s1 { font-size: 9px; font-weight: 900; letter-spacing: 1px; }
  .inv-stamp .s2 { font-size: 7.5px; margin-top: 3px; letter-spacing: 0.5px; }

  .inv-contact {
    text-align: center;
    font-size: 11px; color: #666;
    padding: 10px 24px 14px;
    border-top: 1px solid #eee;
    position: relative; z-index: 3;
  }

  /* ── PRINT ── */
  @media print {
    body { background: #fff; padding: 0; }
    .app-shell { display: block; }
    .form-panel { display: none; }
    .preview-panel { width: 100%; }
    .preview-label { display: none; }
    #invoice {
      border: none;
      border-radius: 0;
      min-height: unset;
    }
    @page { size: A4; margin: 0; }
  }
</style>
</head>
<body>

<div class="app-shell">

  <!-- ── FORM ── -->
  <div class="form-panel">
    <h2>
      <svg width="16" height="16" fill="none" stroke="#00BFFF" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      Invoice details
    </h2>

    <div class="field">
      <label>Invoice number</label>
      <div class="inv-no-row">
        <span class="inv-prefix">RA -</span>
        <input type="text" id="f-invno" placeholder="61" oninput="render()">
      </div>
    </div>

    <div class="field">
      <label>Bill to</label>
      <input type="text" id="f-billto" placeholder="KEYSOOM" oninput="render()">
    </div>

    <div class="field">
      <label>Route</label>
      <input type="text" id="f-route" placeholder="MGQ – DSM – ABW – MGQ" oninput="render()">
    </div>

    <div class="field">
      <label>Flight date</label>
      <input type="date" id="f-flightdate" oninput="render()">
    </div>

    <div class="field">
      <label>Date issued</label>
      <input type="date" id="f-issuedate" oninput="render()">
    </div>

    <div class="items-section">
      <div class="items-header">
        <span>Line items</span>
        <button class="add-btn" onclick="addItem()">+ Add row</button>
      </div>
      <div class="col-labels">
        <span>Description</span><span>Qty</span><span>Rate $</span><span></span>
      </div>
      <div id="items-list"></div>
    </div>

    <button class="print-btn" onclick="window.print()">&#x1F5A8; Print / Save as PDF</button>
  </div>

  <!-- ── PREVIEW ── -->
  <div class="preview-panel">
    <p class="preview-label">Live preview</p>
    <div id="invoice"></div>
  </div>

</div>

<script>
  let items = [
    { desc: 'HOURS',       qty: '3.07', rate: '1400' },
    { desc: 'FAVORI',      qty: '1',    rate: '1130' },
    { desc: 'CREW PERDIM', qty: '1',    rate: '300'  }
  ];

  function today() {
    return new Date().toISOString().split('T')[0];
  }

  function fmtDate(val) {
    if (!val) return '';
    const [y, m, d] = val.split('-');
    const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return parseInt(d) + '-' + mon[parseInt(m)-1] + '-' + y;
  }

  function addItem() {
    items.push({ desc: '', qty: '', rate: '' });
    renderForm();
    render();
  }

  function removeItem(i) {
    items.splice(i, 1);
    renderForm();
    render();
  }

  function renderForm() {
    document.getElementById('items-list').innerHTML = items.map((it, i) => `
      <div class="line-item">
        <input type="text" placeholder="Description" value="${it.desc}"
          oninput="items[${i}].desc=this.value;render()">
        <input type="text" placeholder="Qty" value="${it.qty}"
          oninput="items[${i}].qty=this.value;render()">
        <input type="text" placeholder="Rate" value="${it.rate}"
          oninput="items[${i}].rate=this.value;render()">
        <button class="remove-btn" onclick="removeItem(${i})" title="Remove">&times;</button>
      </div>
    `).join('');
  }

  function render() {
    const invNo      = document.getElementById('f-invno').value.trim();
    const billTo     = document.getElementById('f-billto').value.trim()     || 'KEYSOOM';
    const route      = document.getElementById('f-route').value.trim()      || 'MGQ – DSM – ABW – MGQ';
    const flightDate = fmtDate(document.getElementById('f-flightdate').value) || '2-MAY-2026';
    const issueDate  = fmtDate(document.getElementById('f-issuedate').value)  || '5-may-2026';

    let total = 0;
    const rows = items.map((it, i) => {
      const qty  = parseFloat(it.qty)  || 0;
      const rate = parseFloat(it.rate) || 0;
      const amt  = qty * rate;
      total += amt;
      const fmtAmt  = amt  ? '$' + amt.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}) : '';
      const fmtRate = rate ? '$' + rate.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}) : '';
      return `<tr>
        <td>${i+1}</td>
        <td>${it.desc || ''}</td>
        <td>${it.qty || ''}</td>
        <td>${fmtRate}</td>
        <td>${fmtAmt}</td>
      </tr>`;
    }).join('');

    const totalStr = '$' + total.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
    const wm = Array(40).fill('<span>RAYAAN AIR&nbsp;&nbsp;&nbsp;</span>').join('');

    document.getElementById('invoice').innerHTML = `
      <div class="inv-corner"></div>
      <div class="inv-watermark">${wm}</div>

      <div class="inv-logo-wrap">
        <img src="logo.jpeg" alt="Rayaan Air">
      </div>

      <div class="inv-title-row">
        <span class="word">INVOICE</span>
        <span class="inv-ref">RA - ${invNo || '___'}</span>
      </div>

      <table class="inv-meta">
        <tr>
          <td class="lbl">From</td>
          <td class="val">Rayaan Air</td>
          <td class="lbl">Date Issue</td>
          <td class="val">${issueDate}</td>
        </tr>
        <tr>
          <td class="lbl">Bill To</td>
          <td class="val"><strong>${billTo}</strong></td>
          <td class="lbl">Route</td>
          <td class="val"><strong>${route}</strong></td>
        </tr>
        <tr>
          <td class="lbl">Flight Date</td>
          <td class="val"><strong>${flightDate}</strong></td>
          <td></td><td></td>
        </tr>
      </table>

      <table class="inv-items" style="margin-top:16px">
        <thead>
          <tr>
            <th>No</th>
            <th>Description</th>
            <th>Quantity</th>
            <th>Rate (USD)</th>
            <th>Amount (USD)</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr class="inv-total-row">
            <td colspan="4">Total Balance</td>
            <td>${totalStr}</td>
          </tr>
        </tfoot>
      </table>

      <div class="inv-footer">
        <div class="inv-payment">
          <h4>Payment Method</h4>
          <p>
            <strong>Bank: SALAAM BANK</strong><br>
            Account Name: Rayaan Air &amp; Cargo Sales<br>
            Account Number: <strong>38496121</strong><br>
            <br>
            <strong>IBS BANK</strong><br>
            Account Name: Rayaan Air &amp; Cargo<br>
            Account Number: <strong>0209384308840014</strong>
          </p>
        </div>
        <div class="inv-stamp">
          <div class="s1">RAYAAN AIR</div>
          <div class="s2">MOGADISHU – SOMALIA</div>
        </div>
      </div>

      <div class="inv-contact">
        Banadir, Mogdishu, Somalia &nbsp;|&nbsp; +252613363634 &nbsp;|&nbsp; rayaanair@gmail.com
      </div>
    `;
  }

  // init
  document.getElementById('f-issuedate').value  = today();
  document.getElementById('f-flightdate').value = today();
  renderForm();
  render();
</script>
</body>
</html>
